<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simone Tarenzi | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header class="glass">
            <div class="logo">Simone Tarenzi | Portfolio</div>
            <nav>
                <a href="#experience">Experience</a>
                <a href="#education">Education</a>
                <a href="#projects">Projects</a>
                <a href="#skills">Skills</a>
                <a href="mailto:simonetarenzi97@gmail.com">Contact</a>
            </nav>
        </header>

        <section class="hero">
            <div class="hero-text">
                <h1 id="profile-name">Loading...</h1>
                <h2 id="profile-title">Loading...</h2>
                <p id="profile-bio">Loading...</p>
                <div class="btn-group" id="hero-btns">
                    </div>
            </div>
            <div class="hero-img">
                <img id="profile-photo" src="" alt="Profile Photo" class="profile-photo">
            </div>
        </section>

        <h2 class="section-title" id="experience">Work Experience</h2>
        <div class="grid" id="experience-grid"></div>

        <h2 class="section-title" id="education">Education</h2>
        <div class="grid" id="education-grid"></div>

        <h2 class="section-title" id="projects">Selected Projects</h2>
        <div class="grid" id="projects-grid"></div>

        <h2 class="section-title" id="skills">Technical Arsenal</h2>
        <div class="glass skills-container">
            <div class="grid" id="skills-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));"></div>
        </div>

        <footer class="glass">
            <p>&copy; 2025 Simone Tarenzi</p>
            <div style="margin-top: 10px;">
                <a href="mailto:simonetarenzi97@gmail.com">Email</a> •
                <a href="https://linkedin.com/in/simone-tarenzi">LinkedIn</a> • 
                <a href="https://github.com/Bluxen">GitHub</a>
            </div>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
